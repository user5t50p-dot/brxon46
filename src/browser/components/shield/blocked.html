<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم حجب الصفحة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black:    #06020c;
    --purple-1: #2e1065;
    --purple-2: #4c1d95;
    --purple-3: #6d28d9;
    --purple-4: #8b5cf6;
    --purple-5: #c4b5fd;
    --white:    #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
    font-family: 'Aref Ruqaa', serif;
    color: var(--white);
  }

  /* ─── Canvas خلفية ─── */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ─── الوهج المركزي ─── */
  .glow-center {
    position: fixed;
    top: 50%; left: 50%;
    width: 500px; height: 500px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(109,40,217,.18) 0%, transparent 70%);
    z-index: 1;
    animation: glowPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%,100% { opacity: .6; transform: translate(-50%,-50%) scale(1); }
    50%      { opacity: 1;  transform: translate(-50%,-50%) scale(1.12); }
  }

  /* ─── المشهد المركزي ─── */
  .scene {
    position: fixed;
    inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    pointer-events: none;
  }

  /* ─── الحلقات الدوارة ─── */
  .rings {
    position: absolute;
    width: 300px; height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    transform: translate(-50%,-50%);
  }
  .ring-1 {
    width: 190px; height: 190px;
    border: 1px solid rgba(139,92,246,.2);
    animation: spin 22s linear infinite;
  }
  .ring-2 {
    width: 255px; height: 255px;
    border: 1px solid rgba(109,40,217,.12);
    animation: spin 38s linear infinite reverse;
  }
  .ring-3 {
    width: 310px; height: 310px;
    border: 1px solid rgba(76,29,149,.08);
    animation: spin 55s linear infinite;
  }
  @keyframes spin {
    to { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* نقاط على الحلقات */
  .ring::before {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--purple-4);
    top: -2px; left: calc(50% - 2px);
    box-shadow: 0 0 6px 2px rgba(139,92,246,.6);
  }
  .ring-2::before { background: var(--purple-3); width: 3px; height: 3px; }
  .ring-3::before { background: var(--purple-2); width: 2px; height: 2px; opacity: .5; }

  /* ─── الدرع ─── */
  .shield-wrap {
    position: relative;
    width: 140px; height: 160px;
    margin-bottom: 32px;
    animation: shieldFloat 6s ease-in-out infinite;
  }
  @keyframes shieldFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .shield-svg {
    width: 100%; height: 100%;
    animation: shieldGlow 3.5s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(139,92,246,.5));
  }
  @keyframes shieldGlow {
    0%,100% { filter: drop-shadow(0 0 18px rgba(139,92,246,.4)); }
    50%      { filter: drop-shadow(0 0 40px rgba(167,139,250,.75)); }
  }

  /* رسم علامة الصح */
  .check-path {
    stroke-dasharray: 65;
    stroke-dashoffset: 65;
    animation: drawCheck 1.1s cubic-bezier(.4,0,.2,1) .6s forwards;
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  /* ─── النصوص ─── */
  .label-blocked {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .22em;
    color: var(--purple-4);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp .7s ease 1.3s forwards;
  }

  .title-main {
    font-size: 40px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: .05em;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(139,92,246,.55), 0 0 80px rgba(76,29,149,.3);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp .7s ease 1.5s forwards;
  }

  .divider {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple-4), transparent);
    margin: 0 auto 14px;
    opacity: 0;
    animation: fadeUp .7s ease 1.65s forwards;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    color: rgba(196,181,253,.45);
    letter-spacing: .12em;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp .7s ease 1.8s forwards;
  }

  /* ─── شريحة URL ─── */
  .url-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 18px 6px 14px;
    border: 1px solid rgba(139,92,246,.22);
    border-radius: 24px;
    background: rgba(46,16,101,.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 12px;
    color: rgba(196,181,253,.5);
    letter-spacing: .1em;
    opacity: 0;
    animation: fadeUp .7s ease 2s forwards;
    pointer-events: all;
    cursor: default;
    transition: border-color .3s, color .3s;
  }
  .url-chip:hover {
    border-color: rgba(139,92,246,.45);
    color: rgba(196,181,253,.8);
  }
  .url-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--purple-3);
    box-shadow: 0 0 5px rgba(109,40,217,.8);
    animation: dotBlink 2s ease-in-out infinite;
  }
  @keyframes dotBlink {
    0%,100% { opacity: 1; }
    50%      { opacity: .25; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── معلومات الركن ─── */
  .corner-info {
    position: fixed;
    bottom: 28px; left: 28px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    animation: fadeUp .7s ease 2.3s forwards;
    pointer-events: none;
  }
  .corner-info span {
    font-size: 10px;
    letter-spacing: .14em;
    color: rgba(139,92,246,.3);
    font-family: 'Aref Ruqaa', serif;
  }
  .corner-info span.val {
    color: rgba(196,181,253,.22);
  }

  /* ─── زر العودة ─── */
  .back-btn {
    position: fixed;
    top: 24px; right: 28px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border: 1px solid rgba(139,92,246,.2);
    border-radius: 20px;
    background: rgba(46,16,101,.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(196,181,253,.5);
    font-family: 'Aref Ruqaa', serif;
    font-size: 13px;
    letter-spacing: .08em;
    cursor: pointer;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp .6s ease 2.2s forwards;
    transition: border-color .3s, color .3s, background .3s;
  }
  .back-btn:hover {
    border-color: rgba(139,92,246,.5);
    color: rgba(196,181,253,.9);
    background: rgba(76,29,149,.2);
  }
  .back-btn svg { flex-shrink: 0; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="glow-center"></div>

<!-- زر العودة -->
<a class="back-btn" onclick="history.back(); return false;" href="#">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
    <path d="M8 2L3 6.5L8 11" stroke="currentColor" stroke-width="1.4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  عودة
</a>

<!-- الحلقات -->
<div class="rings" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
</div>

<!-- المشهد الرئيسي -->
<div class="scene">

  <div class="shield-wrap">
    <svg class="shield-svg" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg" x1="10%" y1="0%" x2="90%" y2="100%">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
          <stop offset="100%" stop-color="#ede9fe" stop-opacity=".95"/>
        </linearGradient>
        <linearGradient id="bgShield" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%"   stop-color="#7c3aed" stop-opacity=".1"/>
          <stop offset="100%" stop-color="#4c1d95" stop-opacity=".04"/>
        </linearGradient>
      </defs>
      <!-- وهج الحافة -->
      <path d="M60 3 L115 26 V68.5 C115 105 60 137 60 137 C60 137 5 105 5 68.5 V26 Z"
            fill="url(#bgShield)"
            stroke="#8b5cf6" stroke-width="1.2" stroke-opacity=".35"/>
      <!-- جسم الدرع -->
      <path d="M60 10 L108 29.5 V68 C108 100.5 60 128 60 128 C60 128 12 100.5 12 68 V29.5 Z"
            fill="url(#sg)"/>
      <!-- خط داخلي -->
      <path d="M60 18 L96 33 V67 C96 93 60 114 60 114 C60 114 24 93 24 67 V33 Z"
            fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity=".2"/>
      <!-- علامة الصح -->
      <path class="check-path"
            d="M42 66 L55 78 L80 50"
            stroke="#2e1065" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <p class="label-blocked">access blocked</p>
  <h1 class="title-main">تم حجب الصفحة</h1>
  <div class="divider"></div>
  <p class="subtitle">تم حجب هذا الصفحة لانتهاكها سياسة المتصفح الامن</p>
  <div class="url-chip">
    <span class="url-dot"></span>
    <span id="urlText">—</span>
  </div>

</div>

<!-- معلومات الركن -->
<div class="corner-info">
  <span>رمز الخطأ — <span class="val">403 Forbidden</span></span>
  <span id="timeStamp" class="val"></span>
</div>

<script>
/* ── معلومات ديناميكية ── */
document.getElementById('urlText').textContent =
  document.referrer ? new URL(document.referrer).hostname : (location.hostname || 'unknown');

const ts = document.getElementById('timeStamp');
function tick() {
  ts.textContent = new Date().toLocaleTimeString('ar-SA', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}
tick();
setInterval(tick, 1000);

/* ── خلفية الجسيمات الحية ── */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* جسيمات عائمة */
class Orb {
  constructor(init) {
    this.reset(init);
  }
  reset(init) {
    this.x      = Math.random() * canvas.width;
    this.y      = init ? Math.random() * canvas.height : canvas.height + 10;
    this.r      = Math.random() * 1.6 + 0.3;
    this.vx     = (Math.random() - 0.5) * 0.22;
    this.vy     = -(Math.random() * 0.28 + 0.04);
    this.alpha  = Math.random() * 0.28 + 0.04;
    this.hue    = Math.random() * 55 + 250;
    this.life   = 0;
    this.maxLife= Math.random() * 450 + 180;
  }
  step() {
    this.x += this.vx + Math.sin(this.life * 0.013) * 0.18;
    this.y += this.vy;
    this.life++;
    if (this.y < -8 || this.life > this.maxLife) this.reset(false);
  }
  draw() {
    const a = this.alpha * Math.sin((this.life / this.maxLife) * Math.PI);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},70%,65%,${a})`;
    ctx.fill();
  }
}

/* خيوط ضبابية */
class Thread {
  constructor() { this.reset(); }
  reset() {
    this.x      = Math.random() * canvas.width;
    this.y      = Math.random() * canvas.height;
    this.len    = Math.random() * 70 + 25;
    this.angle  = Math.random() * Math.PI * 2;
    this.speed  = (Math.random() - 0.5) * 0.005;
    this.alpha  = Math.random() * 0.055 + 0.008;
    this.life   = 0;
    this.maxLife= Math.random() * 320 + 100;
    this.drift  = { x: (Math.random()-0.5)*0.14, y: (Math.random()-0.5)*0.07 };
  }
  step() {
    this.angle += this.speed;
    this.x += this.drift.x;
    this.y += this.drift.y;
    this.life++;
    if (this.life > this.maxLife ||
        this.x < -100 || this.x > canvas.width + 100) this.reset();
  }
  draw() {
    const a  = this.alpha * Math.sin((this.life / this.maxLife) * Math.PI);
    const x2 = this.x + Math.cos(this.angle) * this.len;
    const y2 = this.y + Math.sin(this.angle) * this.len;
    const g  = ctx.createLinearGradient(this.x, this.y, x2, y2);
    g.addColorStop(0,   `rgba(109,40,217,0)`);
    g.addColorStop(0.5, `rgba(139,92,246,${a})`);
    g.addColorStop(1,   `rgba(76,29,149,0)`);
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = g;
    ctx.lineWidth   = 0.55;
    ctx.stroke();
  }
}

/* شبكة نقاط خافتة */
class Node {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random()-0.5) * 0.08;
    this.vy = (Math.random()-0.5) * 0.08;
    this.r  = 0.8;
  }
  step() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width)  this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(139,92,246,0.12)';
    ctx.fill();
  }
}

const orbs    = Array.from({length: 60},  (_, i) => new Orb(true));
const threads = Array.from({length: 20},  () => new Thread());
const nodes   = Array.from({length: 30},  () => new Node());

/* روابط الشبكة بين النقاط */
function connectNodes() {
  const dist = (canvas.width + canvas.height) / 10;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < dist) {
        const a = (1 - d / dist) * 0.06;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(109,40,217,${a})`;
        ctx.lineWidth   = 0.4;
        ctx.stroke();
      }
    }
  }
}

/* وهج نابض */
let t = 0;
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.016;

  const cx = canvas.width / 2, cy = canvas.height / 2;
  const pulse = Math.sin(t) * 0.5 + 0.5;
  const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
  gr.addColorStop(0, `rgba(109,40,217,${0.05 + pulse * 0.07})`);
  gr.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  nodes.forEach(n => { n.step(); n.draw(); });
  connectNodes();
  threads.forEach(th => { th.step(); th.draw(); });
  orbs.forEach(o => { o.step(); o.draw(); });

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
